version: '3.8'

services:
  vue-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: viaje-espana-dev
    ports:
      - "3000:3000"
    volumes:
      # Montar código fuente para hot reload
      # .:/app monta todo el directorio actual en /app del contenedor
      - .:/app
      # Volumen anónimo para node_modules
      # Esto evita que node_modules del host sobrescriba el del contenedor
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    restart: unless-stopped
    # stderr y stdout para ver logs del servidor Vite
    stdin_open: true
    tty: true

# Red opcional para comunicar con otros servicios (ej: Supabase)
networks:
  default:
    name: viaje-espana-network

