services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: serina-client
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    depends_on:
      - server
    restart: unless-stopped
    stdin_open: true
    tty: true

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: serina-server
    ports:
      - "4000:4000"
    volumes:
      - ./server:/app
      - /app/node_modules
      - ./.env:/app/.env:ro
    env_file:
      - .env
    restart: unless-stopped

networks:
  default:
    name: serina-network
